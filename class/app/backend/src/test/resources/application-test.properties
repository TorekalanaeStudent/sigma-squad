# TEST DATABASE CONFIGURATION (In-Memory H2)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA CONFIGURATION
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT CONFIGURATION
jwt.secret=test-secret-key-must-be-at-least-32-characters-long-for-hs256
jwt.expiration=86400000

# CHATBOT CONFIGURATION
chatbot.api-key=test-api-key

# EMAIL CONFIGURATION (GMAIL SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@gmail.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# PASSWORD RESET
password-reset.token-expiration-hours=1

# SERVER CONFIGURATION
server.address=0.0.0.0
server.port=8080

# LOGGING
logging.level.com.sigma_squad.computify=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
