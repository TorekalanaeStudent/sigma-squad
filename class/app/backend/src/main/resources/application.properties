spring.application.name=computify

# DATABASE CONFIGURATION
spring.datasource.url=jdbc:postgresql://localhost:5432/CLASS
spring.datasource.username=postgres
spring.datasource.password=sigma

# JPA CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT CONFIGURATION
jwt.secret=your-secret-key-must-be-at-least-32-characters-long-for-hs256
jwt.expiration=86400000

# SERVER CONFIGURATION
server.servlet.context-path=/api
server.port=8080

# LOGGING
logging.level.com.sigma_squad.computify=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
